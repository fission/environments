name: 'Setup Fission Environment'
description: 'Sets up Helm, Kind cluster, Fission CLI, and completes base Fission setup'
inputs:
  kind-node-image:
    description: 'Kind node image to use'
    required: false
    default: 'kindest/node:v1.34.8@sha256:02722c2dedddcfc00febf5d27fbeb9b7b2c14294c82109ff4a85d89ac9ba3256'
  kind-version:
    description: 'Kind version to use'
    required: false
    default: 'v0.32.0'
  helm-version:
    description: 'Helm version to use'
    required: false
    default: 'v3.21.0'
  kind-config:
    description: 'Kind config file'
    required: false
    default: 'kind.yaml'
  fission-cli-version:
    description: 'Fission CLI version to install'
    required: false
    default: 'v1.25.0'
runs:
  using: "composite"
  steps:
    - name: Helm
      uses: Azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1
      with:
        version: ${{ inputs.helm-version }}

    - name: Kind Cluster
      uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
      with:
        node_image: ${{ inputs.kind-node-image }}
        version: ${{ inputs.kind-version }}
        config: ${{ inputs.kind-config }}
        cluster_name: kind

    - name: Configuring and testing the Installation
      shell: bash
      run: |
        kubectl cluster-info --context kind-kind
        kind get kubeconfig >$HOME/.kube/config
        kubectl get nodes

    # Base Setup Steps (merged from fission-base-setup)
    - name: Base Setup
      shell: bash
      run: |
        make verify-kind-cluster
        make install-fission-cli
        make install-skaffold
        make create-crds
